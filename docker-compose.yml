services:
  inference-svc:
    build:
      context: .
      dockerfile: inference-svc/Dockerfile
    container_name: sign-inference
    ports:
      - '50051:50051'
    environment:
      - GRPC_PORT=50051
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_STAGE=Production
    networks:
      - sign-net
    restart: unless-stopped

  ui-svc:
    build:
      context: .
      dockerfile: ui-svc/Dockerfile
    container_name: sign-ui
    ports:
      - '8501:8501'
    environment:
      - INFERENCE_GRPC_HOST=inference-svc
      - INFERENCE_GRPC_PORT=50051
    networks:
      - sign-net
    depends_on:
      - inference-svc
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: sign-mlflow
    ports:
      - '5000:5000'
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    networks:
      - sign-net
    restart: unless-stopped

networks:
  sign-net:
    driver: bridge

volumes:
  mlflow_data:
